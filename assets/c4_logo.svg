<svg width="240" height="160" viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="240" height="160" fill="#ffffff" />
  
  <text x="10" y="20" fill="#334155" font-family="sans-serif" font-size="11" font-weight="bold" letter-spacing="0.5">C4 Clustering</text>

  <!-- Central Core -->
  <circle cx="120" cy="85" r="14" fill="#3b82f6" />
  <circle cx="120" cy="85" r="6" fill="#ffffff" />

  <!-- Cluster 1 (Top Left) -->
  <g>
    <circle cx="60" cy="50" r="14" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="3" />
    <circle cx="55" cy="45" r="3" fill="#0ea5e9" />
    <circle cx="65" cy="55" r="3" fill="#0ea5e9" />
    <circle cx="58" cy="58" r="3" fill="#0ea5e9" />
    <path d="M 60 50 Q 90 60 110 75" stroke="#0ea5e9" stroke-width="2" fill="none" />
  </g>

  <!-- Cluster 2 (Top Right) -->
  <g>
    <circle cx="180" cy="50" r="14" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="3" />
    <circle cx="185" cy="45" r="3" fill="#a855f7" />
    <circle cx="175" cy="55" r="3" fill="#a855f7" />
    <circle cx="182" cy="58" r="3" fill="#a855f7" />
    <path d="M 180 50 Q 150 60 130 75" stroke="#a855f7" stroke-width="2" fill="none" />
  </g>

  <!-- Cluster 3 (Bottom Left) -->
  <g>
    <circle cx="60" cy="120" r="14" fill="#dcfce7" stroke="#10b981" stroke-width="1.5" stroke-dasharray="3" />
    <circle cx="55" cy="115" r="3" fill="#10b981" />
    <circle cx="65" cy="125" r="3" fill="#10b981" />
    <circle cx="58" cy="128" r="3" fill="#10b981" />
    <path d="M 60 120 Q 90 110 110 95" stroke="#10b981" stroke-width="2" fill="none" />
  </g>

  <!-- Cluster 4 (Bottom Right) -->
  <g>
    <circle cx="180" cy="120" r="14" fill="#ffedd5" stroke="#f97316" stroke-width="1.5" stroke-dasharray="3" />
    <circle cx="185" cy="115" r="3" fill="#f97316" />
    <circle cx="175" cy="125" r="3" fill="#f97316" />
    <circle cx="182" cy="128" r="3" fill="#f97316" />
    <path d="M 180 120 Q 150 110 130 95" stroke="#f97316" stroke-width="2" fill="none" />
  </g>

  <!-- Cross-Covariance links -->
  <path d="M 60 50 Q 120 40 180 50" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4" fill="none" />
  <path d="M 60 120 Q 120 130 180 120" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4" fill="none" />
</svg>
