<svg width="240" height="160" viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg">
  <rect width="240" height="160" fill="#ffffff" />

  <defs>
    <linearGradient id="fv_global" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4338ca" />
    </linearGradient>
    <linearGradient id="fv_good" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="fv_bad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fca5a5" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
    <linearGradient id="fv_mid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <marker id="fv_a1" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto">
      <path d="M 0 0 L 5 2.5 L 0 5 Z" fill="#a5b4fc" />
    </marker>
    <marker id="fv_a2" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto">
      <path d="M 0 0 L 5 2.5 L 0 5 Z" fill="#6366f1" />
    </marker>
  </defs>

  <!-- ===== GLOBAL SERVER (top center) ===== -->
  <g transform="translate(120, 22)">
    <rect x="-28" y="-14" width="56" height="28" rx="6" fill="url(#fv_global)" />
    <!-- Small globe/aggregation icon -->
    <circle cx="0" cy="0" r="8" fill="none" stroke="#c7d2fe" stroke-width="1.2" />
    <ellipse cx="0" cy="0" rx="8" ry="3" fill="none" stroke="#c7d2fe" stroke-width="0.8" />
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#c7d2fe" stroke-width="0.8" />
  </g>

  <!-- ===== COMMUNICATION LINKS (bidirectional) ===== -->
  <!-- Server <-> Client 1 -->
  <path d="M 100 36 Q 52 55 42 72" fill="none" stroke="#a5b4fc" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#fv_a1)" />
  <path d="M 46 70 Q 58 52 104 36" fill="none" stroke="#6366f1" stroke-width="1.5" marker-end="url(#fv_a2)" />
  <!-- Server <-> Client 2 -->
  <line x1="120" y1="36" x2="120" y2="70" stroke="#a5b4fc" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#fv_a1)" />
  <line x1="116" y1="70" x2="116" y2="38" stroke="#6366f1" stroke-width="1.5" marker-end="url(#fv_a2)" />
  <!-- Server <-> Client 3 -->
  <path d="M 140 36 Q 188 55 198 72" fill="none" stroke="#a5b4fc" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#fv_a1)" />
  <path d="M 194 70 Q 182 52 136 36" fill="none" stroke="#6366f1" stroke-width="1.5" marker-end="url(#fv_a2)" />

  <!-- ===== CLIENT 1 (left) — HIGH quality data ===== -->
  <g transform="translate(42, 110)">
    <rect x="-30" y="-34" width="60" height="60" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" />
    
    <!-- Data quality bar (tall green = good data) -->
    <rect x="-22" y="-28" width="8" height="26" rx="1" fill="url(#fv_good)" />
    <rect x="-22" y="-2" width="8" height="4" rx="1" fill="url(#fv_bad)" opacity="0.4" />

    <!-- RL loop: state → action → reward cycle -->
    <g transform="translate(5, -12)">
      <!-- Circular RL loop -->
      <circle cx="0" cy="0" r="10" fill="none" stroke="#059669" stroke-width="1.5" />
      <!-- Arrow on loop -->
      <path d="M 8 -6 L 10 -2 L 6 -3" fill="#059669" />
      <!-- s, a, r nodes -->
      <circle cx="0" cy="-10" r="3" fill="#d1fae5" stroke="#059669" stroke-width="1" />
      <circle cx="9" cy="5" r="3" fill="#d1fae5" stroke="#059669" stroke-width="1" />
      <circle cx="-9" cy="5" r="3" fill="#d1fae5" stroke="#059669" stroke-width="1" />
    </g>

    <!-- Vote checkmarks (this client votes YES for good actions) -->
    <g transform="translate(10, 12)">
      <circle cx="0" cy="0" r="5" fill="#22c55e" />
      <path d="M -2.5 0 L -0.5 2 L 3 -2" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" />
    </g>
  </g>

  <!-- ===== CLIENT 2 (center) — MEDIUM quality data ===== -->
  <g transform="translate(120, 110)">
    <rect x="-30" y="-34" width="60" height="60" rx="5" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5" />
    
    <!-- Data quality bar (medium) -->
    <rect x="-22" y="-28" width="8" height="14" rx="1" fill="url(#fv_good)" />
    <rect x="-22" y="-14" width="8" height="8" rx="1" fill="url(#fv_mid)" />
    <rect x="-22" y="-6" width="8" height="8" rx="1" fill="url(#fv_bad)" opacity="0.6" />

    <!-- RL loop -->
    <g transform="translate(5, -12)">
      <circle cx="0" cy="0" r="10" fill="none" stroke="#d97706" stroke-width="1.5" />
      <path d="M 8 -6 L 10 -2 L 6 -3" fill="#d97706" />
      <circle cx="0" cy="-10" r="3" fill="#fef3c7" stroke="#d97706" stroke-width="1" />
      <circle cx="9" cy="5" r="3" fill="#fef3c7" stroke="#d97706" stroke-width="1" />
      <circle cx="-9" cy="5" r="3" fill="#fef3c7" stroke="#d97706" stroke-width="1" />
    </g>

    <!-- Vote (mixed - partial check) -->
    <g transform="translate(10, 12)">
      <circle cx="0" cy="0" r="5" fill="#f59e0b" />
      <path d="M -2 0 L 2 0" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" />
    </g>
  </g>

  <!-- ===== CLIENT 3 (right) — LOW quality data ===== -->
  <g transform="translate(198, 110)">
    <rect x="-30" y="-34" width="60" height="60" rx="5" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" />
    
    <!-- Data quality bar (mostly bad) -->
    <rect x="-22" y="-28" width="8" height="6" rx="1" fill="url(#fv_good)" opacity="0.5" />
    <rect x="-22" y="-22" width="8" height="24" rx="1" fill="url(#fv_bad)" />

    <!-- RL loop -->
    <g transform="translate(5, -12)">
      <circle cx="0" cy="0" r="10" fill="none" stroke="#dc2626" stroke-width="1.5" />
      <path d="M 8 -6 L 10 -2 L 6 -3" fill="#dc2626" />
      <circle cx="0" cy="-10" r="3" fill="#fee2e2" stroke="#dc2626" stroke-width="1" />
      <circle cx="9" cy="5" r="3" fill="#fee2e2" stroke="#dc2626" stroke-width="1" />
      <circle cx="-9" cy="5" r="3" fill="#fee2e2" stroke="#dc2626" stroke-width="1" />
    </g>

    <!-- Vote (reject - X mark) -->
    <g transform="translate(10, 12)">
      <circle cx="0" cy="0" r="5" fill="#ef4444" />
      <path d="M -2 -2 L 2 2 M 2 -2 L -2 2" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" />
    </g>
  </g>
</svg>
