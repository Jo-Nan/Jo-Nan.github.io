<svg width="240" height="160" viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="240" height="160" fill="#ffffff" />
  
  <text x="10" y="20" fill="#334155" font-family="sans-serif" font-size="11" font-weight="bold" letter-spacing="0.5">Federated Offline RL</text>

  <!-- Global Server -->
  <g transform="translate(120, 50)">
    <rect x="-30" y="-20" width="60" height="40" rx="8" fill="url(#serverGrad)" />
    <text x="0" y="5" fill="#ffffff" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Global Q</text>
  </g>

  <!-- Local Clients -->
  <g transform="translate(50, 110)">
    <rect x="-25" y="-15" width="50" height="30" rx="4" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5" />
    <text x="0" y="4" fill="#334155" font-family="sans-serif" font-size="9" text-anchor="middle">Local Q</text>
  </g>

  <g transform="translate(120, 110)">
    <rect x="-25" y="-15" width="50" height="30" rx="4" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5" />
    <text x="0" y="4" fill="#334155" font-family="sans-serif" font-size="9" text-anchor="middle">Local Q</text>
  </g>

  <g transform="translate(190, 110)">
    <rect x="-25" y="-15" width="50" height="30" rx="4" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5" />
    <text x="0" y="4" fill="#334155" font-family="sans-serif" font-size="9" text-anchor="middle">Local Q</text>
  </g>

  <!-- Communication / Rectification Links -->
  <g stroke="#3b82f6" stroke-width="2" stroke-dasharray="4" fill="none">
    <path d="M 50 95 Q 85 75 100 70" />
    <path d="M 120 95 L 120 70" />
    <path d="M 190 95 Q 155 75 140 70" />
  </g>

  <!-- Actor Rectification Icons -->
  <circle cx="75" cy="85" r="5" fill="#f59e0b" />
  <path d="M 72 85 L 74 88 L 78 82" stroke="#ffffff" stroke-width="1.5" fill="none" />

  <circle cx="120" cy="82" r="5" fill="#f59e0b" />
  <path d="M 117 82 L 119 85 L 123 79" stroke="#ffffff" stroke-width="1.5" fill="none" />

  <circle cx="165" cy="85" r="5" fill="#f59e0b" />
  <path d="M 162 85 L 164 88 L 168 82" stroke="#ffffff" stroke-width="1.5" fill="none" />

</svg>
