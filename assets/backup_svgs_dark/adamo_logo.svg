<svg width="240" height="160" viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="optGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="240" height="160" fill="#0f172a" rx="12" />
  
  <!-- Subtle Grid -->
  <g stroke="#1e293b" stroke-width="1">
    <line x1="0" y1="40" x2="240" y2="40" />
    <line x1="0" y1="80" x2="240" y2="80" />
    <line x1="0" y1="120" x2="240" y2="120" />
    <line x1="60" y1="0" x2="60" y2="160" />
    <line x1="120" y1="0" x2="120" y2="160" />
    <line x1="180" y1="0" x2="180" y2="160" />
  </g>

  <!-- Title Text -->
  <text x="20" y="25" fill="#e2e8f0" font-family="sans-serif" font-size="12" font-weight="bold" letter-spacing="1">AdamO Optimizer</text>

  <!-- Axes -->
  <path d="M 30 130 L 210 130 M 30 130 L 30 40" stroke="#475569" stroke-width="2" stroke-linecap="round" />
  
  <!-- Optimization Landscape / Curve -->
  <path d="M 30 50 Q 80 50, 110 100 T 190 120" stroke="url(#optGrad)" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#glow)" />
  
  <!-- Trajectory Points -->
  <circle cx="30" cy="50" r="3" fill="#60a5fa" />
  <circle cx="65" cy="55" r="4" fill="#60a5fa" />
  <circle cx="95" cy="80" r="4" fill="#60a5fa" />
  <circle cx="125" cy="115" r="4" fill="#60a5fa" />
  <circle cx="155" cy="122" r="4" fill="#8b5cf6" />
  
  <!-- Global Minimum Target -->
  <circle cx="190" cy="120" r="6" fill="#c084fc" filter="url(#glow)" />
  <circle cx="190" cy="120" r="3" fill="#ffffff" />
  
  <!-- Suppressed Collapse Representation -->
  <path d="M 120 40 L 160 80 M 160 40 L 120 80" stroke="#ef4444" stroke-width="2" opacity="0.4" stroke-linecap="round" />
</svg>
