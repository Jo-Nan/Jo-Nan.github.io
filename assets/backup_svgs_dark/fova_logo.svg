<svg width="240" height="160" viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fovaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="240" height="160" fill="#0f172a" rx="12" />
  <text x="20" y="25" fill="#e2e8f0" font-family="sans-serif" font-size="12" font-weight="bold" letter-spacing="1">FOVA Data Filter</text>

  <!-- Funnel / Filter Shape -->
  <path d="M 100 40 L 140 40 L 125 70 L 125 120 L 115 120 L 115 70 Z" fill="none" stroke="#64748b" stroke-width="2" />
  <rect x="110" y="70" width="20" height="4" fill="#38bdf8" filter="url(#glow)" />

  <!-- Mixed Quality Data Input (Chaotic lines) -->
  <path d="M 30 40 Q 60 20 80 40 T 110 40" stroke="#ef4444" stroke-width="2" fill="none" opacity="0.7" />
  <path d="M 30 55 Q 50 70 70 50 T 100 50" stroke="#f59e0b" stroke-width="2" fill="none" opacity="0.7" />
  <path d="M 30 70 Q 70 80 90 60 T 115 60" stroke="#10b981" stroke-width="2" fill="none" opacity="0.7" />
  
  <!-- Data particles entering -->
  <circle cx="95" cy="45" r="2" fill="#ef4444" />
  <circle cx="85" cy="55" r="2" fill="#f59e0b" />
  <circle cx="105" cy="65" r="2" fill="#10b981" />

  <!-- High Quality Data Output (Straight steady beam) -->
  <path d="M 120 120 L 120 150" stroke="#3b82f6" stroke-width="4" filter="url(#glow)" />
  <path d="M 120 120 L 120 145" stroke="#ffffff" stroke-width="1.5" />
  
  <!-- Validated data streams spreading out -->
  <path d="M 120 140 Q 160 140 190 120" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.8" />
  <path d="M 120 140 Q 160 150 200 140" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.8" />
  
  <!-- Target Models receiving clean data -->
  <rect x="185" y="110" width="16" height="12" rx="2" fill="#0284c7" />
  <rect x="195" y="130" width="16" height="12" rx="2" fill="#0284c7" />
</svg>
