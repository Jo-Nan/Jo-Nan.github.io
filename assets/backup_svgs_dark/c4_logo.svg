<svg width="240" height="160" viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="c4Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="240" height="160" fill="#0f172a" rx="12" />
  
  <text x="20" y="25" fill="#e2e8f0" font-family="sans-serif" font-size="12" font-weight="bold" letter-spacing="1">C4 Clustering</text>

  <!-- Central Core -->
  <circle cx="120" cy="85" r="16" fill="url(#c4Grad)" filter="url(#glow)" />
  <circle cx="120" cy="85" r="8" fill="#ffffff" opacity="0.5" />

  <!-- Cluster 1 -->
  <g opacity="0.8">
    <circle cx="60" cy="50" r="12" fill="none" stroke="#2dd4bf" stroke-width="2" stroke-dasharray="4" />
    <circle cx="55" cy="45" r="3" fill="#2dd4bf" />
    <circle cx="65" cy="55" r="3" fill="#2dd4bf" />
    <circle cx="58" cy="58" r="3" fill="#2dd4bf" />
    <path d="M 60 50 Q 90 60 110 75" stroke="#2dd4bf" stroke-width="1.5" fill="none" />
  </g>

  <!-- Cluster 2 -->
  <g opacity="0.8">
    <circle cx="180" cy="50" r="12" fill="none" stroke="#60a5fa" stroke-width="2" stroke-dasharray="4" />
    <circle cx="185" cy="45" r="3" fill="#60a5fa" />
    <circle cx="175" cy="55" r="3" fill="#60a5fa" />
    <circle cx="182" cy="58" r="3" fill="#60a5fa" />
    <path d="M 180 50 Q 150 60 130 75" stroke="#60a5fa" stroke-width="1.5" fill="none" />
  </g>

  <!-- Cluster 3 -->
  <g opacity="0.8">
    <circle cx="60" cy="120" r="12" fill="none" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4" />
    <circle cx="55" cy="115" r="3" fill="#a78bfa" />
    <circle cx="65" cy="125" r="3" fill="#a78bfa" />
    <circle cx="58" cy="128" r="3" fill="#a78bfa" />
    <path d="M 60 120 Q 90 110 110 95" stroke="#a78bfa" stroke-width="1.5" fill="none" />
  </g>

  <!-- Cluster 4 -->
  <g opacity="0.8">
    <circle cx="180" cy="120" r="12" fill="none" stroke="#f472b6" stroke-width="2" stroke-dasharray="4" />
    <circle cx="185" cy="115" r="3" fill="#f472b6" />
    <circle cx="175" cy="125" r="3" fill="#f472b6" />
    <circle cx="182" cy="128" r="3" fill="#f472b6" />
    <path d="M 180 120 Q 150 110 130 95" stroke="#f472b6" stroke-width="1.5" fill="none" />
  </g>

  <!-- Cross-Covariance links -->
  <path d="M 60 50 Q 120 40 180 50" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="2" fill="none" opacity="0.5" />
  <path d="M 60 120 Q 120 130 180 120" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="2" fill="none" opacity="0.5" />
</svg>
