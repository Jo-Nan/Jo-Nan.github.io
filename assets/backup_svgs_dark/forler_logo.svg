<svg width="240" height="160" viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="forlerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="240" height="160" fill="#0f172a" rx="12" />
  <text x="20" y="25" fill="#e2e8f0" font-family="sans-serif" font-size="12" font-weight="bold" letter-spacing="1">FORLER FL</text>

  <!-- Central Server Cloud -->
  <ellipse cx="120" cy="85" rx="35" ry="25" fill="none" stroke="url(#forlerGrad)" stroke-width="3" filter="url(#glow)" />
  <path d="M 105 85 L 115 70 L 135 70 L 125 95 L 115 95 Z" fill="#38bdf8" opacity="0.8" />
  
  <!-- Edge Devices and connections -->
  <!-- Top Left -->
  <rect x="30" y="35" width="20" height="14" rx="2" fill="#0284c7" />
  <path d="M 50 45 L 95 70" stroke="#10b981" stroke-width="2" stroke-dasharray="4" filter="url(#glow)"/>
  
  <!-- Bottom Left -->
  <rect x="30" y="115" width="20" height="14" rx="2" fill="#0284c7" />
  <path d="M 50 120 L 95 95" stroke="#10b981" stroke-width="2" stroke-dasharray="4" filter="url(#glow)"/>

  <!-- Top Right -->
  <rect x="190" y="35" width="20" height="14" rx="2" fill="#0284c7" />
  <path d="M 190 45 L 145 70" stroke="#10b981" stroke-width="2" stroke-dasharray="4" filter="url(#glow)"/>

  <!-- Bottom Right -->
  <rect x="190" y="115" width="20" height="14" rx="2" fill="#0284c7" />
  <path d="M 190 120 L 145 95" stroke="#10b981" stroke-width="2" stroke-dasharray="4" filter="url(#glow)"/>

  <!-- Actor Rectification Shield -->
  <path d="M 120 115 C 130 115 140 105 140 95 C 140 125 120 140 120 140 C 120 140 100 125 100 95 C 100 105 110 115 120 115 Z" fill="#f59e0b" opacity="0.6" filter="url(#glow)" />
</svg>
