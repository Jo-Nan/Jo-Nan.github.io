<svg width="240" height="160" viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Interference pattern -->
    <pattern id="interferenceLight" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 0 10 L 10 0" stroke="#ef4444" stroke-width="1" opacity="0.15" />
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="240" height="160" fill="#ffffff" />
  
  <text x="10" y="20" fill="#334155" font-family="sans-serif" font-size="11" font-weight="bold" letter-spacing="0.5">PoPeC Routing</text>

  <!-- Unreliable Channel Area -->
  <rect x="60" y="50" width="120" height="80" fill="url(#interferenceLight)" />
  <path d="M 60 50 L 180 50 L 180 130 L 60 130 Z" fill="none" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4" opacity="0.8" />

  <!-- Edge Server (Destination) -->
  <path d="M 190 70 L 210 70 L 210 110 L 190 110 Z" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2" />
  <line x1="195" y1="80" x2="205" y2="80" stroke="#3b82f6" stroke-width="2" />
  <line x1="195" y1="90" x2="205" y2="90" stroke="#3b82f6" stroke-width="2" />
  <line x1="195" y1="100" x2="205" y2="100" stroke="#3b82f6" stroke-width="2" />

  <!-- Antenna -->
  <line x1="200" y1="70" x2="200" y2="50" stroke="#3b82f6" stroke-width="2" />
  <circle cx="200" cy="50" r="3" fill="#3b82f6" />
  <path d="M 190 40 Q 200 30 210 40" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.7" />
  <path d="M 185 35 Q 200 20 215 35" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.4" />

  <!-- Priority Data Path (Curved to avoid worst interference) -->
  <path d="M 30 110 Q 80 140 120 90 T 190 90" stroke="#10b981" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Priority Packets (Stars inside boxes) -->
  <g transform="translate(60, 110)">
    <rect x="-6" y="-6" width="12" height="12" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" />
    <path d="M 0 -3 L 1 -1 L 3 -1 L 1.5 0.5 L 2 2.5 L 0 1.5 L -2 2.5 L -1.5 0.5 L -3 -1 L -1 -1 Z" fill="#f59e0b" />
  </g>
  <g transform="translate(118, 90)">
    <rect x="-6" y="-6" width="12" height="12" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" />
    <path d="M 0 -3 L 1 -1 L 3 -1 L 1.5 0.5 L 2 2.5 L 0 1.5 L -2 2.5 L -1.5 0.5 L -3 -1 L -1 -1 Z" fill="#f59e0b" />
  </g>
  <g transform="translate(170, 90)">
    <rect x="-6" y="-6" width="12" height="12" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" />
    <path d="M 0 -3 L 1 -1 L 3 -1 L 1.5 0.5 L 2 2.5 L 0 1.5 L -2 2.5 L -1.5 0.5 L -3 -1 L -1 -1 Z" fill="#f59e0b" />
  </g>

  <!-- Low Priority Data Path (Straight through interference, getting lost) -->
  <path d="M 30 70 L 100 70" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="4" fill="none" />
  <rect x="50" y="66" width="8" height="8" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1" />
  <path d="M 105 60 L 115 80 M 115 60 L 105 80" stroke="#ef4444" stroke-width="2.5" /> <!-- Packet drop -->

</svg>
